# FOLLOW-UP: Gemma 4 Thinking Channel Filter
# ============================================================================

follow_up:

  - id: followup-1
    title: "ThinkingTagFilter: Support Gemma 4 channel format"
    priority: high
    status: completed
    started_at: "2026-04-06"
    completed_at: "2026-04-06"
    blocked_by: []
    notes: ""
    description: >
      Gemma 4 uses <|channel>thought ... <channel|> for chain-of-thought
      reasoning instead of <think>/<thinking> XML tags. The existing
      ThinkingTagFilter in api_handler.py only handles the XML format.
      Gemma 4 thinking blocks will leak through to the chat UI.
    file: backend/api_handler.py
    changes:
      - location: "ThinkingTagFilter class (line 12)"
        action: modify
        detail: >
          Add '<|channel>thought' to OPEN_TAGS and '<channel|>' to CLOSE_TAGS.
          Update _STRIP_RE to also match the channel format. Update
          MAX_TAG_LEN accordingly. The state machine logic (NORMAL vs
          INSIDE_THINKING) should work unchanged — only the tag lists and
          regex need updating.
    acceptance:
      - "Streaming output strips <|channel>thought...<channel|> blocks"
      - "Non-streaming strip_thinking_tags() also handles channel format"
      - "Existing <think>/<thinking> handling unaffected"
      - "Partial channel tag prefixes buffered correctly (no false positives)"
