# ============================================================================
# RISKS
# ============================================================================

risks:

  - id: risk-1
    title: "Existing KoboldCPP users get garbled output"
    impact: high
    probability: low
    mitigation: >
      When template_format is None, fall back to current plain-text story mode.
      Users who never selected a template see no change.
    phase: phase-3

  - id: risk-2
    title: "Template tokens increase memory field size"
    impact: medium
    probability: medium
    mitigation: >
      Template tokens add ~30-80 chars overhead. KoboldCPP max_context_length
      handles this naturally. Log a warning if context budget is tight.
    phase: phase-3

  - id: risk-3
    title: "Stop sequence mismatch causes runaway or premature cutoff"
    impact: high
    probability: medium
    mitigation: >
      Template-derived stop sequences replace hardcoded ones. Must test each
      template family. Add all turn-boundary tokens as stops (matching
      SillyTavern's sequences_as_stop_strings pattern).
    phase: phase-3

  - id: risk-4
    title: "outputSequence derivation fails for edge-case custom templates"
    impact: medium
    probability: low
    mitigation: >
      Provide explicit outputSequence for all built-in templates. Derivation
      from assistantFormat is only a fallback for custom templates.
    phase: phase-1

  - id: risk-5
    title: "Gemma treats user-wrapped system content unexpectedly"
    impact: medium
    probability: low
    mitigation: >
      SillyTavern uses this exact approach (system_same_as_user) successfully
      with Gemma 2/3. Test with actual Gemma 4 model.
    phase: phase-3

  - id: risk-6
    title: "Legacy codepath divergence"
    impact: medium
    probability: medium
    mitigation: >
      Short-term: keep both paths working. Long-term: migrate all users to
      backend_assembly=true and retire the legacy path.
    phase: phase-5

