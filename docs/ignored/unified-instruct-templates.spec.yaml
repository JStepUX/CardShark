              If template_format has outputSequence, resolve variables and return.
              Otherwise split assistantFormat on {{content}}, take the prefix,
              resolve {{char}} -> char_name. Fallback: return '{char_name}:'.
        acceptance:
          - "Returns '<start_of_turn>model\\n' for gemma4 template"
          - "Returns '<|im_start|>assistant\\n\\n' for openai template"
          - "Returns 'CharName:' when no template provided"

      - id: phase-2.2
        title: "Add _wrap_memory_for_kobold helper"
        status: completed
        completed_at: "2026-04-06"
        notes: ""
        file: backend/services/prompt_assembly_service.py
        changes:
          - action: add_method
            class: PromptAssemblyService
            method: "_wrap_memory_for_kobold(self, memory, template_format, system_instruction, char_name, user_name) -> str"
            logic: >
              1. Prepend system_instruction to memory content if present.
              2. If systemFormat is non-null, wrap in systemFormat.
              3. Elif systemSameAsUser is true, wrap in userFormat.
              4. Else wrap content bare.
              5. Resolve {{content}}, {{char}}, {{user}} variables.
        acceptance:
          - "Gemma template wraps memory in <start_of_turn>user\\n...content...<end_of_turn>\\n"
          - "ChatML template wraps memory in <|im_start|>system\\n\\n...content...<|im_end|>\\n\\n"
          - "system_instruction appears before character card content inside the wrapper"

      - id: phase-2.3
        title: "Add systemSameAsUser handling to _format_chat_history"
        status: completed
        completed_at: "2026-04-06"
        notes: ""
        file: backend/services/prompt_assembly_service.py
