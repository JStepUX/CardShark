meta:
  id: unified-instruct-templates
  title: "Unified Instruct Templates for All Providers (Including KoboldCPP)"
  created: "2026-04-06"
  updated: "2026-04-06"
  status: completed
  authors:
    - James
  reviewers: []

# ============================================================================
# PROBLEM STATEMENT
# ============================================================================

problem:
  summary: >
    KoboldCPP prompt assembly bypasses the template system entirely, sending
    plain "Name: message" transcript to the model. Modern instruct-tuned models
    (Gemma 4, Llama 3/4, Mistral V7, Qwen) perform poorly without their
    expected chat template tokens.
  root_cause: >
    _assemble_kobold() in prompt_assembly_service.py ignores template_format
    and delegates to kobold_prompt_builder.build_story_prompt(), which produces
    raw story-mode text. This was correct for completion-era models but is wrong
    for instruct-tuned models.
  evidence:
    - file: backend/services/prompt_assembly_service.py
      line: 226
      detail: "_assemble_kobold() is called without template_format"
    - file: backend/services/prompt_assembly_service.py
      line: 453
      detail: "_assemble_kobold() signature does not accept template_format"
    - file: backend/kobold_prompt_builder.py
      line: 78
      detail: "build_story_prompt() formats as 'User: msg\\nChar: msg' with no instruct tokens"
  reference_implementation:
    project: SillyTavern
    approach: >
      Client-side template application. The same native KoboldCPP endpoint
      receives a fully template-wrapped prompt string. use_story=false,
      use_memory=false. Template is baked into the prompt before sending.
    key_file: "public/scripts/instruct-mode.js"

# ============================================================================
# DESIGN DECISIONS
# ============================================================================

decisions:
  keep_kobold_adapter:
    decision: true
    rationale:
      - "memory/prompt split provides truncation protection (character card survives long conversations)"
      - "Native sampling params (Mirostat, DRY, XTC, dynatemp, sampler_order) only available on native endpoint"
      - "LogitShaper banned_tokens is KoboldCPP-exclusive"
      - "Native endpoint is template-neutral — no risk of double-applying templates"
      - "SSE wire format differs from OpenAI-compatible endpoints"

  unify_prompt_formatting:
    decision: true
    rationale:
      - "Native endpoint does raw text continuation — it doesn't care what's in the text"
      - "SillyTavern proves template-wrapped prompts work on the same native endpoint"
      - "Instruct-tuned models need their template tokens to perform well"

  preserve_story_mode_fallback:
    decision: true
    rationale:
      - "Backward compatibility for users who haven't selected a template"
      - "Some completion-era models may still perform better in story mode"
      - "When template_format is None, behavior is identical to current production"

  architecture_summary: >
    Template application becomes universal. Only the transport layer (how the
    formatted prompt gets packaged for the wire) stays provider-specific.
    KoboldCPP: template-wrapped content -> memory + prompt fields.
    Others: template-wrapped content -> messages array.

# ============================================================================
# PHASES
# ============================================================================

phases:

  # --------------------------------------------------------------------------
  # PHASE 1: Extend Template Schema
  # --------------------------------------------------------------------------
  - id: phase-1
    title: "Extend Template Schema"
    priority: critical
    status: completed
    started_at: "2026-04-06"
    completed_at: "2026-04-06"
    blocked_by: []
    notes: ""
    description: >
      Add new fields to the template type system and JSON definitions.
      Purely additive — no behavioral change.

    tasks:

      - id: phase-1.1
        title: "Add systemSameAsUser and outputSequence to TemplateSchema"
        status: completed
        completed_at: "2026-04-06"
        notes: ""
        file: frontend/src/types/templateTypes.ts
        changes:
          - location: "TemplateSchema z.object (line 7)"
            action: add_fields
            fields:
              - name: systemSameAsUser
                type: "z.boolean().optional().default(false)"
                purpose: >
                  When true, system content wraps in userFormat instead of
                  systemFormat. Required for models without a native system
                  role (Gemma, older Mistral).
              - name: outputSequence
                type: "z.string().optional()"
                purpose: >
                  The open assistant turn prefix appended at the end of the
                  prompt. If absent, derived by splitting assistantFormat on
                  {{content}} and taking the prefix.
          - location: "ITemplate interface (line 28)"
            action: add_fields
            fields:
              - name: "systemSameAsUser?"
                type: boolean
              - name: "outputSequence?"
                type: string
        acceptance:
          - "TemplateSchema.parse() accepts objects with systemSameAsUser and outputSequence"
          - "TemplateSchema.parse() accepts objects without these fields (backward compat)"
          - "Existing template objects pass validation unchanged"

      - id: phase-1.2
        title: "Add Gemma 3/4 template to templates.json"
        status: completed
        completed_at: "2026-04-06"
        notes: ""
        file: frontend/src/config/templates.json
        changes:
          - location: "after gemma2 entry (line 103)"
            action: insert_template
            template:
              id: gemma4
              name: "Google Gemma 3/4"
              description: "Format for Google Gemma 3 and Gemma 4 models (no system role)"
              isBuiltIn: true
              isEditable: false
              systemFormat: null
              systemSameAsUser: true
              userFormat: "<start_of_turn>user\n{{content}}<end_of_turn>\n"
              assistantFormat: "<start_of_turn>model\n{{char}}: {{content}}<end_of_turn>\n"
              outputSequence: "<start_of_turn>model\n"
              memoryFormat: "<start_of_turn>user\nPersona: {{description}}\nPersonality: {{personality}}\nScenario: {{scenario}}\n\n{{examples}}<end_of_turn>\n"
              detectionPatterns: ["<start_of_turn>", "<end_of_turn>"]
              stopSequences: ["<start_of_turn>", "<end_of_turn>", "{{user}}:"]
              search: ["<start_of_turn>"]
        acceptance:
          - "Template loads via templateService.getTemplateById('gemma4')"
          - "Template is visible in APICard template selector dropdown"

      - id: phase-1.3
        title: "Backfill outputSequence on existing templates"
        status: completed
        completed_at: "2026-04-06"
        notes: ""
        file: frontend/src/config/templates.json
        changes:
          - action: add_field_to_all_templates
            field: outputSequence
            values:
              openai: "<|im_start|>assistant\n\n"
              chatml-phi4: "<|im_start|>assistant<|im_sep|>"
              chatml-qwen: "<|im_start|>assistant\n\n"
              chatml: "<|im_start|>assistant\n\n"
              gemma2: "<start_of_turn>model\n"
              llama3: "<|start_header_id|>assistant<|end_header_id|>\n\n"
              mistral-v7: ""
              mistral-v3: ""
              mistral: ""
              phi-3.5: "<|assistant|>\n"
