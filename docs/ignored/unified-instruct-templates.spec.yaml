    priority: critical
    status: completed
    started_at: "2026-04-06"
    completed_at: "2026-04-06"
    blocked_by: [phase-2]
    notes: ""
    description: >
      The core change. Make _assemble_kobold accept template_format and apply
      instruct formatting when a template is available. Preserve memory/prompt
      split and story-mode fallback.

    tasks:

      - id: phase-3.1
        title: "Pass template_format into _assemble_kobold from assemble()"
        status: completed
        completed_at: "2026-04-06"
        notes: ""
        file: backend/services/prompt_assembly_service.py
        changes:
          - location: "assemble() method, is_kobold branch (~line 226)"
            action: modify
            detail: "Add template_format=template_format to _assemble_kobold() call"
        acceptance:
          - "_assemble_kobold receives the template_format dict from the payload"

      - id: phase-3.2
        title: "Rewrite _assemble_kobold to support templates"
        status: completed
        completed_at: "2026-04-06"
        notes: ""
        file: backend/services/prompt_assembly_service.py
        changes:
          - location: "_assemble_kobold (line 453)"
            action: modify
            detail: >
              Add template_format parameter to signature. When template_format
              is provided:
              1. Memory: call _wrap_memory_for_kobold() instead of raw prepend
              2. Chat history: call _format_chat_history() instead of build_story_prompt()
              3. Post-history: wrap in template user format
              4. Generation stub: use _get_output_sequence() instead of 'CharName:'
              5. Stop sequences: call _get_stop_sequences() instead of build_story_stop_sequences()
              6. Do NOT append '\n***' (template tokens replace this delimiter)
              7. Do NOT append '</s>' to stop sequences (KoboldCPP handles EOS natively)
              When template_format is None: preserve current behavior exactly.
        acceptance:
          - "With gemma4 template: memory contains <start_of_turn>user\\n...card...<end_of_turn>"
          - "With gemma4 template: prompt contains <start_of_turn>user\\n...msg...<end_of_turn>"
          - "With gemma4 template: prompt ends with <start_of_turn>model\\n (open turn)"
          - "With gemma4 template: stop_sequences include <start_of_turn> and <end_of_turn>"
